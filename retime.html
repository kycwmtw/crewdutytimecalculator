<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>改時通知產生器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(251, 191, 36, 0.22), transparent 30%),
        radial-gradient(circle at 88% 12%, rgba(253, 230, 138, 0.28), transparent 24%),
        radial-gradient(circle at bottom right, rgba(251, 191, 36, 0.14), transparent 24%),
        linear-gradient(180deg, #fffaf0 0%, #fffdf7 34%, #f8fafc 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 24rem;
      height: 24rem;
      border-radius: 9999px;
      filter: blur(88px);
      opacity: 0.28;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: -10rem;
      left: -8rem;
      background: rgba(245, 158, 11, 0.26);
    }

    body::after {
      right: -8rem;
      bottom: -10rem;
      background: rgba(250, 204, 21, 0.2);
    }

    body > div {
      position: relative;
      z-index: 1;
    }

    ::selection {
      background: rgba(245, 158, 11, 0.18);
      color: #0f172a;
    }

    @media (max-width: 767px) {
      body::before,
      body::after {
        width: 16rem;
        height: 16rem;
      }
    }
  </style>
</head>
<body class="min-h-screen text-slate-800 antialiased">
  <div class="w-full xl:max-w-[50vw] mx-auto px-4 py-6 md:px-6 md:py-8 lg:px-8 lg:py-10">
    <header class="mb-8 md:mb-10">
      <div class="relative overflow-hidden rounded-[32px] border border-amber-900/80 bg-[linear-gradient(135deg,#422006_0%,#78350f_52%,#92400e_100%)] text-white shadow-[0_32px_90px_-42px_rgba(120,53,15,0.72)] p-6 md:p-8 lg:p-10">
        <div class="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
          <div class="max-w-3xl">
            <p class="text-amber-200 text-sm tracking-[0.25em] uppercase">Function 5</p>
            <h1 class="text-3xl md:text-4xl lg:text-[2.6rem] font-bold mt-3">改時通知產生器</h1>
            <p class="text-amber-100/90 mt-4 max-w-3xl leading-relaxed text-base md:text-[1.05rem]">
              輸入航班號、日期與新的 ETD，快速產生改時通知內容。
            </p>
          </div>
          <a href="./index.html" class="shrink-0 rounded-2xl bg-white/12 text-white px-5 py-3 font-medium border border-white/15 hover:bg-white/18 transition shadow-lg backdrop-blur-md">
            返回功能選單
          </a>
        </div>
      </div>
    </header>

    <main class="space-y-6">
      <section class="bg-white/85 backdrop-blur-xl rounded-[32px] shadow-[0_28px_80px_-44px_rgba(120,53,15,0.34)] border border-white/80 overflow-hidden">
        <div class="px-6 md:px-7 py-5 md:py-6 border-b border-slate-200/70 bg-[linear-gradient(180deg,rgba(255,251,235,0.92),rgba(255,255,255,0.82))]">
          <h2 class="text-xl font-bold">輸入重要資訊</h2>
          <p class="text-slate-500 mt-1">請輸入航班號、航班日期與新的 ETD（Local Time）。</p>
        </div>
        <div class="p-5 md:p-6 lg:p-7">
          <div class="rounded-3xl border border-slate-200 bg-slate-50 p-5 space-y-5">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-medium mb-2">航班號</label>
                <div class="flex gap-2 items-center">
                  <div class="flex h-[50px] items-center justify-center rounded-2xl border border-slate-300 bg-slate-100 px-4 text-slate-700 font-semibold min-w-[72px] shrink-0">CI</div>
                  <input id="reTimeFlightNo" type="text" placeholder="例如 5877" class="w-full h-[50px] rounded-2xl border border-slate-300 px-4 py-3 bg-white focus:outline-none focus:ring-2 focus:ring-amber-500" />
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium mb-2">航班日期</label>
                <input id="reTimeFlightDate" type="date" class="w-full rounded-2xl border border-slate-300 px-4 py-3 bg-white focus:outline-none focus:ring-2 focus:ring-amber-500" />
              </div>

              <div class="lg:col-span-2">
                <label class="block text-sm font-medium mb-2">NEW ETD <span class="text-slate-500 text-xs">（Local Time）</span></label>
                <div class="flex flex-col sm:flex-row gap-2">
                  <input id="reTimeEtdDate" type="date" class="w-full sm:flex-[1.8] min-w-0 rounded-2xl border border-slate-300 px-4 py-3 bg-white focus:outline-none focus:ring-2 focus:ring-amber-500" />
                  <select id="reTimeEtdHour" class="w-full sm:flex-1 rounded-2xl border border-slate-300 px-4 py-3 bg-white focus:outline-none focus:ring-2 focus:ring-amber-500">
                    <option value="00">00</option><option value="01">01</option><option value="02">02</option><option value="03">03</option><option value="04">04</option><option value="05">05</option><option value="06">06</option><option value="07">07</option><option value="08">08</option><option value="09">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option>
                  </select>
                  <select id="reTimeEtdMinute" class="w-full sm:flex-1 rounded-2xl border border-slate-300 px-4 py-3 bg-white focus:outline-none focus:ring-2 focus:ring-amber-500">
                    <option value="00">00</option><option value="05">05</option><option value="10">10</option><option value="15">15</option><option value="20">20</option><option value="25">25</option><option value="30">30</option><option value="35">35</option><option value="40">40</option><option value="45">45</option><option value="50">50</option><option value="55">55</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="flex flex-wrap gap-3">
              <button onclick="calculateReTimeNotice()" class="rounded-2xl bg-amber-600 text-white px-5 py-3 font-medium hover:bg-amber-700 transition">確認並產生通知</button>
              <button onclick="resetReTime()" class="rounded-2xl bg-slate-200 text-slate-800 px-5 py-3 font-medium hover:bg-slate-300 transition">清除</button>
            </div>
          </div>
        </div>
      </section>

      <section class="bg-white/85 backdrop-blur-xl rounded-[32px] shadow-[0_28px_80px_-44px_rgba(120,53,15,0.34)] border border-white/80 overflow-hidden">
        <div class="px-6 md:px-7 py-5 md:py-6 border-b border-slate-200/70 bg-[linear-gradient(180deg,rgba(255,251,235,0.92),rgba(255,255,255,0.82))]">
          <h2 class="text-xl font-bold">計算結果</h2>
          <p class="text-slate-500 mt-1">系統根據輸入自動計算 BOT Reporting Time（NEW ETD − 90 分鐘）。</p>
        </div>
        <div class="p-5 md:p-6 lg:p-7">
          <div id="reTimeResult" class="rounded-2xl bg-white border border-slate-200 p-5 min-h-[120px] flex items-center text-slate-600 shadow-[inset_0_1px_0_rgba(255,255,255,0.78),0_18px_40px_-36px_rgba(15,23,42,0.28)]">
            請輸入必填項目後產生通知。
          </div>
        </div>
      </section>

      <section class="bg-white/85 backdrop-blur-xl rounded-[32px] shadow-[0_28px_80px_-44px_rgba(120,53,15,0.34)] border border-white/80 overflow-hidden">
        <div class="px-6 md:px-7 py-5 md:py-6 border-b border-slate-200/70 bg-[linear-gradient(180deg,rgba(255,251,235,0.92),rgba(255,255,255,0.82))]">
          <h2 class="text-xl font-bold">通知內容預覽</h2>
          <p class="text-slate-500 mt-1">以下為自動產生的改時通知內容，可直接複製傳送。</p>
        </div>
        <div class="p-5 md:p-6 lg:p-7 space-y-4">
          <div id="reTimeNoticePreview" class="rounded-2xl bg-white border border-slate-200 p-5 min-h-[180px] text-slate-700 font-mono text-sm whitespace-pre-line shadow-[inset_0_1px_0_rgba(255,255,255,0.78),0_18px_40px_-36px_rgba(15,23,42,0.28)]">
            請先完成上方必填欄位後產生通知。
          </div>
          <div class="flex flex-wrap gap-3">
            <button onclick="copyReTimeNotice()" class="rounded-2xl bg-slate-900 text-white px-5 py-3 font-medium hover:bg-slate-800 transition">一鍵複製通知內容</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    function reTimeFormatDDMON(date) {
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const day = String(date.getDate()).padStart(2, '0');
      return `${day}${months[date.getMonth()]}`;
    }

    function reTimeFormatHHMM(date) {
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      return `${hours}${minutes}`;
    }

    function calculateReTimeNotice() {
      const flightNoRaw = document.getElementById('reTimeFlightNo').value.trim();
      const flightDateValue = document.getElementById('reTimeFlightDate').value;
      const etdDateValue = document.getElementById('reTimeEtdDate').value;
      const etdHour = document.getElementById('reTimeEtdHour').value;
      const etdMinute = document.getElementById('reTimeEtdMinute').value;

      if (!flightNoRaw || !flightDateValue || !etdDateValue) {
        document.getElementById('reTimeResult').innerHTML = '<span class="text-rose-600">請完整填入航班號、航班日期與 NEW ETD。</span>';
        const n1 = document.getElementById('reTimeNoticePreview');
        n1.textContent = '請先完成上方必填欄位後產生通知。';
        delete n1.dataset.ready;
        return;
      }

      const flightNo = flightNoRaw.replace(/\D/g, '');
      if (!flightNo) {
        document.getElementById('reTimeResult').innerHTML = '<span class="text-rose-600">航班號請輸入數字。</span>';
        const n2 = document.getElementById('reTimeNoticePreview');
        n2.textContent = '請先完成上方必填欄位後產生通知。';
        delete n2.dataset.ready;
        return;
      }

      const flightDate = new Date(`${flightDateValue}T00:00:00`);
      const etdDate = new Date(`${etdDateValue}T${etdHour}:${etdMinute}:00`);
      const botDate = new Date(etdDate.getTime() - 90 * 60 * 1000);

      const flightDDMON = reTimeFormatDDMON(flightDate);
      const etdHHMM = reTimeFormatHHMM(etdDate);
      const etdDDMON = reTimeFormatDDMON(etdDate);
      const botHHMM = reTimeFormatHHMM(botDate);
      const botDDMON = reTimeFormatDDMON(botDate);

      const newEtdStr = `${etdHHMM}L/${etdDDMON}`;
      const botStr = `${botHHMM}L/${botDDMON}`;
      const flightLabel = `CI${flightNo}`;

      document.getElementById('reTimeResult').innerHTML = `
        <div class="w-full space-y-4">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
            <div>
              <div class="text-sm text-slate-500">航班號</div>
              <div class="text-lg font-semibold text-slate-900">${flightLabel}</div>
            </div>
            <div>
              <div class="text-sm text-slate-500">航班日期</div>
              <div class="text-lg font-semibold text-slate-900">${flightDDMON}</div>
            </div>
            <div>
              <div class="text-sm text-slate-500">NEW ETD</div>
              <div class="text-lg font-semibold text-slate-900">${newEtdStr}</div>
            </div>
          </div>
          <div class="pt-1 border-t border-slate-200">
            <div class="text-sm text-slate-500 mb-2">BOT Reporting Time</div>
            <div class="rounded-2xl bg-amber-600 text-white px-5 py-4 shadow-lg">
              <div class="text-sm text-amber-100">最早回報時間</div>
              <div class="text-2xl font-bold mt-1">${botStr}</div>
            </div>
          </div>
        </div>
      `;

      const noticeText = `*** Schedule Change Information ***\n${flightLabel}/${flightDDMON}  **RE-TIME** NOTICE\n\nNEW ETD: ${newEtdStr}\nBOT Reporting Time: ${botStr}\n\nPlease ack on eCrew, thanks!\n\nTPEOS`;
      const noticeEl = document.getElementById('reTimeNoticePreview');
      noticeEl.textContent = noticeText;
      noticeEl.dataset.ready = '1';
    }

    function copyReTimeNotice() {
      const preview = document.getElementById('reTimeNoticePreview');
      const text = preview.textContent.trim();
      if (!text || !preview.dataset.ready) return;
      navigator.clipboard.writeText(text).then(() => {
        const existing = preview.parentElement.querySelector('.reTimeCopyStatus');
        if (existing) existing.remove();
        preview.insertAdjacentHTML('afterend', '<div class="reTimeCopyStatus mt-2 text-slate-500">[已複製到剪貼簿]</div>');
      }).catch(() => {
        const existing = preview.parentElement.querySelector('.reTimeCopyStatus');
        if (existing) existing.remove();
        preview.insertAdjacentHTML('afterend', '<div class="reTimeCopyStatus mt-2 text-rose-600">[複製失敗，請手動複製]</div>');
      });
    }

    function resetReTime() {
      document.getElementById('reTimeFlightNo').value = '';
      document.getElementById('reTimeFlightDate').value = '';
      document.getElementById('reTimeEtdDate').value = '';
      document.getElementById('reTimeEtdHour').value = '00';
      document.getElementById('reTimeEtdMinute').value = '00';
      document.getElementById('reTimeResult').innerHTML = '請輸入必填項目後產生通知。';
      const noticeEl = document.getElementById('reTimeNoticePreview');
      noticeEl.textContent = '請先完成上方必填欄位後產生通知。';
      delete noticeEl.dataset.ready;
      const existing = document.querySelector('.reTimeCopyStatus');
      if (existing) existing.remove();
    }

    document.addEventListener('DOMContentLoaded', function () {
      resetReTime();
    });
  </script>
</body>
</html>
